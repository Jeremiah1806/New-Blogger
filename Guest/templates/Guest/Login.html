<!DOCTYPE HTML>

<html>
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

```
<style>
    body{
        background-size:400% 400%;
        animation:gradient 12s ease infinite;
    }

    @keyframes gradient{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
    }
</style>
```

</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-black via-blue-950 to-red-950">

<div class="w-full max-w-md p-10 rounded-3xl
            backdrop-blur-xl
            bg-black/40
            border border-blue-500/30
            shadow-[0_0_40px_rgba(59,130,246,0.3)]
            text-center">

```
<h3 class="text-3xl font-black text-white mb-2 tracking-tight">
    Welcome to New Blogger
</h3>

<p class="text-blue-300/80 mb-8 tracking-wide">
    Sign in to continue
</p>

<form method="POST">
    {% csrf_token %}

    <div class="space-y-5">

        <input type="email"
               name="email"
               placeholder="Email"
               class="w-full p-4 rounded-xl
                      bg-black/40
                      border border-blue-500/30
                      text-white
                      placeholder:text-gray-400
                      focus:border-blue-400
                      focus:ring-2 focus:ring-blue-500">

        <input type="password"
               name="password"
               placeholder="Password"
               class="w-full p-4 rounded-xl
                      bg-black/40
                      border border-red-500/30
                      text-white
                      placeholder:text-gray-400
                      focus:border-red-400
                      focus:ring-2 focus:ring-red-500">

    </div>

<div class="mt-8 flex gap-3">

    <!-- LOGIN -->
    <button type="submit"
            class="flex-1 py-3 rounded-xl
                   bg-blue-500/10
                   border border-blue-400/30
                   text-blue-200 font-semibold
                   hover:bg-blue-500/20
                   hover:text-white
                   transition-all duration-300">
        Login
    </button>

    <!-- RESET -->
    <button type="reset"
            class="flex-1 py-3 rounded-xl
                   bg-red-500/10
                   border border-red-400/30
                   text-red-200 font-semibold
                   hover:bg-red-500/20
                   hover:text-white
                   transition-all duration-300">
        Reset
    </button>

    <!-- REGISTER -->
    <a href="{% url 'userregistration' %}"
       class="flex-1 py-3 rounded-xl
              bg-green-500/10
              border border-green-400/30
              text-green-200 font-semibold
              text-center
              hover:bg-green-500/20
              hover:text-white
              transition-all duration-300">

        Register

    </a>

</div>


</form>

{% if msg %}
<script>
    alert("{{msg}}")
</script>
{% endif %}
```

</div>

</body>
</html>
