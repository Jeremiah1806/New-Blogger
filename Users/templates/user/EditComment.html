<!DOCTYPE HTML>
<html>
<head>
	{% load static %}
	<link rel="stylesheet" href="{% static 'css/output.css' %}">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Edit Comment</title>

	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

	<style>
body {
    background: linear-gradient(135deg, #000000, #0b1220, #1e3a8a, #7f1d1d);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
	</style>
</head>

<body class="min-h-screen text-white pt-28">
<!-- NAVBAR -->
<nav class="w-full fixed top-0 left-0 z-50 bg-black/40 backdrop-blur-md border-b border-white/10">

    <div class="max-w-6xl mx-auto flex justify-between items-center px-6 py-4 text-white">

        <!-- Logo -->
        <div class="font-bold text-xl text-green-400">
            New Blogger
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex gap-6 text-sm font-semibold">

            <a href="{% url 'user_HomePage' %}" class="hover:text-green-400 transition">
                Home
            </a>

            <a href="{% url 'AddBlog' %}" class="hover:text-yellow-400 transition">
                Add Blog
            </a>

            <a href="{% url 'ViewBlog' %}" class="text-purple-400">
                View Blog
            </a>

            <a href="{% url 'MyProfile' %}" class="hover:text-blue-400 transition">
                Profile
            </a>
            <a href="{% url 'Logout' %}"
   class="hover:text-red-400 transition font-semibold">
    Logout
</a>

        </div>

        <!-- Hamburger Button -->
        <button
            id="menuBtn"
            class="md:hidden text-3xl font-bold">

            ☰

        </button>

    </div>

    <!-- Mobile Menu -->
    <div
        id="mobileMenu"
        class="hidden md:hidden bg-black/70 backdrop-blur-lg border-t border-white/10">

        <a href="{% url 'user_HomePage' %}"
           class="block px-6 py-4 hover:bg-white/10">
            Home
        </a>

        <a href="{% url 'AddBlog' %}"
           class="block px-6 py-4 hover:bg-white/10">
            Add Blog
        </a>

        <a href="{% url 'ViewBlog' %}"
           class="block px-6 py-4 hover:bg-white/10 text-purple-300">
            View Blog
        </a>

        <a href="{% url 'MyProfile' %}"
           class="block px-6 py-4 hover:bg-white/10">
            Profile
        </a>

        <a href="{% url 'Logout' %}"
   class="block px-6 py-4 hover:bg-red-500/20 text-red-300 font-semibold">
    Logout
</a>

    </div>

</nav>
<div class="min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-xl">

	<div class="backdrop-blur-2xl bg-white/5 border border-white/10
				shadow-[0_0_60px_rgba(59,130,246,0.25)]
				rounded-3xl p-8 relative overflow-hidden">

		<!-- glow overlay -->
		<div class="absolute inset-0 bg-gradient-to-br from-blue-500/10 via-transparent to-red-500/10 pointer-events-none"></div>

		<div class="relative">

			<h2 class="text-3xl font-black text-center mb-2">
				Edit Comment
			</h2>

			<p class="text-center text-blue-300/70 mb-8">
				Update your comment below
			</p>

			<form method="POST" class="space-y-6">
				{% csrf_token %}

				<div>
					<label class="text-sm text-blue-300">Your Comment</label>

					<textarea name="comment"
						rows="5"
						class="w-full mt-2 p-4 rounded-xl
							   bg-black/40 border border-blue-500/20
							   text-white focus:outline-none
							   focus:ring-2 focus:ring-blue-500
							   resize-none">{{ comment.comment }}</textarea>

				</div>

				<div class="pt-2">
					<button type="submit"
						class="w-full py-3 rounded-xl
						bg-gradient-to-r from-blue-500/20 to-red-500/20
						border border-white/10
						font-semibold
						hover:from-blue-500/30 hover:to-red-500/30
						hover:scale-105 transition-all duration-300">
						Update Comment
					</button>
				</div>

			</form>

		</div>

	</div>

</div>

</div>
<script>

const menuBtn = document.getElementById("menuBtn");
const mobileMenu = document.getElementById("mobileMenu");

menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
});

</script>
</body>
</html>
