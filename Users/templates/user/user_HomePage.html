<!DOCTYPE HTML>
<html>
<head>

{% load static %}

<link rel="stylesheet" href="{% static 'css/output.css' %}">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Home Page</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
body {
    background: linear-gradient(135deg, #000000, #0b1220, #1e3a8a, #7f1d1d);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
</style>

</head>

<body class="min-h-screen text-white pt-24">

<!-- NAVBAR -->
<!-- NAVBAR -->
<nav class="w-full fixed top-0 left-0 z-50 bg-black/40 backdrop-blur-md border-b border-white/10">

    <div class="max-w-6xl mx-auto flex justify-between items-center px-6 py-4 text-white">

        <!-- Logo -->
        <div class="font-bold text-xl text-green-400">
            New Blogger
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex gap-6 text-sm font-semibold">

            <a href="{% url 'user_HomePage' %}" class="hover:text-green-400 transition">
                Home
            </a>

            <a href="{% url 'AddBlog' %}" class="hover:text-yellow-400 transition">
                Add Blog
            </a>

            <a href="{% url 'ViewBlog' %}" class="text-purple-400">
                View Blog
            </a>

            <a href="{% url 'MyProfile' %}" class="hover:text-blue-400 transition">
                Profile
            </a>
            <a href="/guest/Login"
       class="hover:text-pink-300 transition">
        Login
    </a>

        </div>

        <!-- Hamburger Button -->
        <button
            id="menuBtn"
            class="md:hidden text-3xl font-bold">

            ☰

        </button>

    </div>

    <div
    id="mobileMenu"
    class="hidden md:hidden bg-black/70 backdrop-blur-lg border-t border-white/10">

    <a href="{% url 'user_HomePage' %}" class="block px-6 py-4 hover:bg-white/10">
        Home
    </a>

    <a href="{% url 'AddBlog' %}" class="block px-6 py-4 hover:bg-white/10">
        Add Blog
    </a>

    <a href="{% url 'ViewBlog' %}" class="block px-6 py-4 hover:bg-white/10 text-purple-300">
        View Blog
    </a>

    <a href="{% url 'MyProfile' %}" class="block px-6 py-4 hover:bg-white/10">
        Profile
    </a>

    <a href="/guest/Login"
       class="block px-6 py-4 hover:bg-white/10 text-pink-300 font-bold">
        Login
    </a>

</div>

</nav>

<!-- PAGE CONTENT -->
<div class="w-full max-w-6xl mx-auto flex items-center justify-center">

    <div class="backdrop-blur-2xl bg-white/5 border border-white/10
                shadow-[0_0_60px_rgba(34,197,94,0.25)]
                rounded-3xl p-10 relative overflow-hidden">

        <div class="absolute inset-0 bg-gradient-to-br from-green-500/10 via-transparent to-blue-500/10 pointer-events-none"></div>

        <div class="relative text-center">

            <h1 class="text-5xl font-black mb-3">
                Home Page
            </h1>

            <p class="text-green-300/70 mb-10">
                Welcome back 👋 manage your activity below
            </p>

            <!-- CARDS ROW -->
            <div class="flex flex-row justify-center items-stretch gap-6 flex-wrap">

                <a href="{% url 'MyProfile' %}"
                   class="w-56 h-32 flex flex-col justify-center items-center
                          rounded-2xl bg-black/30 border border-green-500/20
                          hover:scale-105 transition-all duration-300">
                    <h3 class="text-lg font-bold text-green-300">My Profile</h3>
                </a>

                <a href="{% url 'EditProfile' %}"
                   class="w-56 h-32 flex flex-col justify-center items-center
                          rounded-2xl bg-black/30 border border-blue-500/20
                          hover:scale-105 transition-all duration-300">
                    <h3 class="text-lg font-bold text-blue-300">Edit Profile</h3>
                </a>

                <a href="/user/ViewBlog/"
                   class="w-56 h-32 flex flex-col justify-center items-center
                          rounded-2xl bg-black/30 border border-purple-500/20
                          hover:scale-105 transition-all duration-300">
                    <h3 class="text-lg font-bold text-purple-300">My Feed</h3>
                </a>

                <a href="{% url 'AddBlog' %}"
                   class="w-56 h-32 flex flex-col justify-center items-center
                          rounded-2xl bg-black/30 border border-yellow-400/20
                          hover:scale-105 transition-all duration-300">
                    <h3 class="text-lg font-bold text-yellow-300">Add Blog</h3>
                </a>

            </div>

        </div>

    </div>

</div>
<script>

const menuBtn = document.getElementById("menuBtn");
const mobileMenu = document.getElementById("mobileMenu");

menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
});

</script>
</body>
</html>
